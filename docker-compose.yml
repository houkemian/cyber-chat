version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    # 将宿主机的 20002 端口映射到容器的 8000 端口
    ports:
      - "20002:8000"
    volumes:
      - sqlite_data:/app/data  
    environment:
      - DATABASE_URL=sqlite:////app/data/cyber_chat.db
      - ENV=production
    deploy:
      resources:
        limits:
          memory: 500M

  frontend:
    image: nginx:alpine
    restart: always
    # 将宿主机的 20001 端口映射到容器的 80 端口
    ports:
      - "20001:80"
    volumes:
      # 【关键修改】将前端挂载到容器内部的 /cyber-chat 目录下
      - ./frontend/dist:/usr/share/nginx/html/cyber-chat
    deploy:
      resources:
        limits:
          memory: 100M

volumes:
  sqlite_data: