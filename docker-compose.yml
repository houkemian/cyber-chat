version: '3.8'

# 定义日志模板 (YAML Anchor) - 这样可以避免重复写日志配置
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ----------------------------------------
  # 1. 核心应用引擎 (Backend)
  # ----------------------------------------
  backend:
    build: ./backend
    restart: always
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--log-level", "info"]
    env_file:
      - ./backend/.env
    ports:
      - "20002:8000"
    environment:
      # 使用外部托管数据库（例如 Neon）的连接串
      - DATABASE_URL=${DATABASE_URL}
      # 接入 Redis
      - REDIS_URL=redis://redis:6379/0
      - ENV=production
      - DEEPSEEK_MODEL=deepseek-chat
      - DEEPSEEK_SUMMARY_MODEL=deepseek-chat
    depends_on:
      - redis
    deploy:
      resources:
        limits:
          memory: 500M
    logging: *default-logging # 引用模板

  # ----------------------------------------
  # 2. 静态路由与代理 (Frontend)
  # ----------------------------------------
  frontend:
    image: nginx:alpine
    restart: always
    ports:
      - "20001:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    deploy:
      resources:
        limits:
          memory: 100M
    logging: *default-logging

  # ----------------------------------------
  # 3. 高速缓存 (Redis)
  # ----------------------------------------
  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    logging: *default-logging

# 声明持久化数据卷
volumes:
  redis_data: