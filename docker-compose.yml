version: '3.8'

services:
  backend:
    build: ./backend
    restart: always
    # 将宿主机的 20002 端口映射到容器的 8000 端口
    ports:
      - "20002:8000"
    volumes:
      - sqlite_data:/app/data  
    environment:
      - DATABASE_URL=sqlite:////app/data/cyber_chat.db
      - ENV=production
    deploy:
      resources:
        limits:
          memory: 500M

  frontend:
    image: nginx:alpine
    restart: always
    # 将宿主机的 20001 端口映射到容器的 80 端口
    ports:
      - "20001:80"
    volumes:
      # 静态文件挂载到 /cyber-chat 子目录，与 vite base 路径对齐
      - ./frontend/dist:/usr/share/nginx/html/cyber-chat
      # 自定义 nginx 配置，处理 SPA fallback
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    deploy:
      resources:
        limits:
          memory: 100M

volumes:
  sqlite_data: