name: 2000.exe Cyber Deploy

on:
  push:
    branches:
      - main # 当你 push 代码到 main 分支时自动触发

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 1. 检出代码
      uses: actions/checkout@v3

    - name: 2. 设置 Node.js 环境 (利用 GitHub 的服务器)
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: 3. 构建前端静态文件
      run: |
        cd frontend
        npm install
        npm run build
        # 构建完成后，生成的静态文件都在 frontend/dist 目录下

    - name: 4. 通过 SCP 将代码推送到你的云服务器
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "backend/,frontend/dist/,frontend/nginx.conf,docker-compose.yml"
        # ▼ 核心修改 1：将传输目标锚定在 sysop 的专属领地 ▼
        target: "/home/sysop/cyber-chat" 

    - name: 5. SSH 登录服务器并重启 Docker 容器
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # ▼ 核心修改 2：登录后进入正确的目录 ▼
          cd /home/sysop/cyber-chat
          docker compose down
          docker compose up -d --build