server {
    listen 80;
    server_name _;

    # 前端静态文件根目录（对应 docker-compose 挂载路径）
    root /usr/share/nginx/html;
    index index.html;

    # SPA 子路径入口：/cyber-chat/* 全部 fallback 到 index.html
    location /cyber-chat/ {
        try_files $uri $uri/ /cyber-chat/index.html;
    }

    # 精确匹配 /cyber-chat（无尾斜杠）重定向到 /cyber-chat/
    location = /cyber-chat {
        return 301 /cyber-chat/;
    }

    # 禁止访问根路径（根路径由宿主 Nginx 网关统一管理）
    location = / {
        return 404;
    }
}
